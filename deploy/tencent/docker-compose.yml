version: "2.4"

x-logging: &summerwork-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    container_name: summerwork_db
    image: supabase/postgres:17.6.1.136
    restart: unless-stopped
    shm_size: 256mb
    mem_limit: 1200m
    cpus: 0.50
    logging: *summerwork-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost && test \"$$(psql -qAt -U postgres -d postgres -c \"select count(*) from pg_proc p join pg_namespace n on n.oid=p.pronamespace where n.nspname='auth' and p.proname in ('uid','role','email') and pg_get_userbyid(p.proowner)='supabase_auth_admin'\")\" = 3"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
      - -c
      - max_connections=100
    volumes:
      - ./vendor/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:ro
      - ./db/roles-minimal.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:ro
      - ./vendor/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:ro
      - summerwork_db_data:/var/lib/postgresql/data
      - summerwork_db_config:/etc/postgresql-custom
    networks:
      - summerwork_net

  auth:
    container_name: summerwork_auth
    image: supabase/gotrue:v2.189.0
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.20
    logging: *summerwork-logging
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_KEYS: ${JWT_KEYS}
      GOTRUE_JWT_ISSUER: ${API_EXTERNAL_URL}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_PASSWORD_MIN_LENGTH: "12"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"
    networks:
      - summerwork_net

  rest:
    container_name: summerwork_rest
    image: postgrest/postgrest:v14.12
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.15
    logging: *summerwork-logging
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "postgrest", "--ready"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS}
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_ADMIN_SERVER_HOST: localhost
      PGRST_JWT_SECRET: ${JWT_JWKS}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    networks:
      - summerwork_net

  realtime:
    container_name: summerwork_realtime
    hostname: realtime-dev.supabase-realtime
    image: supabase/realtime:v2.102.3
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.30
    logging: *summerwork-logging
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sSfL --head -o /dev/null -H 'Authorization: Bearer ${ANON_KEY_ASYMMETRIC}' http://localhost:4000/api/tenants/realtime-dev/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      API_JWT_JWKS: ${JWT_JWKS}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    networks:
      summerwork_net:
        aliases:
          - realtime-dev.supabase-realtime

  kong:
    container_name: summerwork_kong
    image: kong/kong:3.9.1
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.20
    logging: *summerwork-logging
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_healthy
      realtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s
    ports:
      - 127.0.0.1:8180:8000/tcp
    volumes:
      - ./kong/kong.yml:/home/kong/temp.yml:ro
      - ./kong/entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_ROUTER_FLAVOR: expressions
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: "1"
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,request-termination
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      ANON_KEY_ASYMMETRIC: ${ANON_KEY_ASYMMETRIC}
      SERVICE_ROLE_KEY_ASYMMETRIC: ${SERVICE_ROLE_KEY_ASYMMETRIC}
    entrypoint: ["/bin/sh", "/home/kong/kong-entrypoint.sh"]
    networks:
      - summerwork_net

  app:
    container_name: summerwork_app
    image: summerwork_app:2026-07-17
    build:
      context: ${SUMMERWORK_APP_ROOT:-../..}
      dockerfile: deploy/tencent/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.35
    logging: *summerwork-logging
    depends_on:
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - 127.0.0.1:3180:3000/tcp
    networks:
      - summerwork_net

networks:
  summerwork_net:
    name: summerwork_net
    driver: bridge

volumes:
  summerwork_db_data:
    name: ${SUMMERWORK_DB_VOLUME:-summerwork_db_data}
  summerwork_db_config:
    name: ${SUMMERWORK_DB_CONFIG_VOLUME:-summerwork_db_config}

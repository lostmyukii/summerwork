server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name summerwork.ilelezhan.cn;

    ssl_certificate /etc/letsencrypt/live/summerwork.ilelezhan.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/summerwork.ilelezhan.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 1m;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://127.0.0.1:3180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name summerwork-api.ilelezhan.cn;

    ssl_certificate /etc/letsencrypt/live/summerwork-api.ilelezhan.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/summerwork-api.ilelezhan.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 1m;
    proxy_connect_timeout 5s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    limit_req_status 429;

    location ~ ^/auth/v1/(token|signup) {
        limit_req zone=summerwork_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $summerwork_connection_upgrade;
    }

    location / {
        proxy_pass http://127.0.0.1:8180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $summerwork_connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}

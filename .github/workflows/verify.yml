name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build
      - run: npm run test:render
      - run: npm audit --omit=dev --audit-level=high

  database:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 16
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-16
          echo "/usr/lib/postgresql/16/bin" >> "$GITHUB_PATH"
      - run: bash scripts/verify-local-postgres.sh

# The source workbook is private and intentionally excluded from Git. Run
# `npm run test:source` locally against the original workbook before release.
